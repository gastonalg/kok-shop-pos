
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>KOK Shop POS</title>
<style>
body{font-family:Arial;background:#111;color:#fff;padding:40px}
.card{background:#222;padding:20px;border-radius:10px}
input{padding:8px;margin:5px}
button{padding:8px 12px}
</style>
</head>
<body>
<h1>KOK Shop POS</h1>
<div class="card">
<label>Dólar del día</label>
<input id="fx" type="number" value="1000">
<button onclick="save()">Guardar</button>
</div>
<script>
const API="https://REEMPLAZAR_API";
async function save(){
 const v=document.getElementById("fx").value;
 await fetch(API+"/api/fx/USD_DAY",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({rateArs:Number(v)})})
 alert("Guardado")
}
</script>
</body>
</html>
